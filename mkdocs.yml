site_name: "H&H Ensemble Modeling Toolkit"
site_description: "Orchestrates coupled TRITON (2D hydrodynamic) and SWMM (stormwater management) simulations across local machines and HPC clusters"
site_author: "Daniel Lassiter"
repo_url: "https://github.com/lassiterdc/hhemt"
edit_uri: "edit/develop/docs/"

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - scheme: default

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - htmlproofer:
      validate_external_urls: false
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            filters: ["!^_"]

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

exclude_docs: |
  running a simulation.ipynb
  processing_sim_outputs.ipynb

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Quickstart: tutorials/quickstart.md
      - Norfolk end-to-end: tutorials/norfolk-end-to-end.md
  - How-To Guides:
      - how-to/index.md
      - Installation: how-to/installation.md
      - HPC-profile setup: how-to/hpc-profile-setup.md
      - Config filling: how-to/config-filling.md
      - In-flight operations: how-to/in-flight-operations.md
      - Forcing re-runs: how-to/forcing-reruns.md
      - Combining experiments: how-to/combining-experiments.md
      - Publishing and fetching: how-to/publishing.md
      - Reprex round-trip: how-to/reprex-roundtrip.md
  - Reference:
      - reference/index.md
      - API Reference: reference/api.md
      - FAIR scope table: reference/fair-scope-table.md
      - Example interactive report: reference/example-report.md
  - Explanation:
      - explanation/index.md
      - Capabilities: explanation/capabilities.md
      - Software availability: explanation/software-availability.md
      - Rerun FAQ: explanation/rerun-faq.md
      - Branching and release model: explanation/branching-and-release-model.md
