# to run:
# if environment already exists, first run:
# conda deactivate
# conda env remove -n hhemt
# then:
# either:
  # clean install, no use of :
    # conda create -n hhemt python=3.11 --no-default-packages
    # conda activate hhemt
    # export PYTHONNOUSERSITE=1
    # conda env update -f environment.yaml
  # create directly from environment yaml
    # module purge
    # module load {conda app, e.g., miniforge}
    # conda env create -f environment.yaml
    # conda (or source) activate hhemt
# IMPORTANT: after creating the environment, install the package in editable mode:
  # pip install -e .
  # (required — without this, imports of hhemt will fail)
name: hhemt
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - filelock
  - typer
  - pydantic
  - pyyaml
  - zarr
  - netcdf4
  - scipy
  - pydap
  - h5netcdf
  - h5py  # h5netcdf's default backend; scenario._write_sim_weather_nc reads weather.nc via the xarray h5netcdf engine
  - cftime
  - bottleneck
  - dask
  - matplotlib
  - seaborn
  - jinja2
  - sparse
  - pint
  - bagit
  - openpyxl
  # geospatial packages
  - rioxarray
  - cartopy
  - geopandas
  - fiona
  - pyproj
  - shapely
  # build tools
  - cmake
  - openmpi
  - gxx_linux-64
  # other stuff
  - coverage
  - pytest
  - pytest-xdist>=3.0
  - py-spy>=0.3.14
  - ruff=0.15.10
  - ty
  - pre-commit
  - ipdb
  - ipykernel
  - pip
  - "setuptools<78"  # hsclient uses pkg_resources, removed from setuptools>=78
  # SWMM Python engine from conda-forge, NOT the PyPI wheel: the PyPI
  # swmm-toolkit 0.17.0 wheel heap-corrupts in pyswmm Simulation.execute()
  # (free(): tcache 2 / SIGABRT) on modern glibc, and 0.17.0 also has an
  # Output.node_series "Input Error 422" reader regression. conda-forge
  # swmm-toolkit=0.15 (0.15.2) is clean on both; pyswmm resolves to 2.0.1.
  - swmm-toolkit=0.15
  - pyswmm
  - pip:
      - hsclient
      - swmmio
      # !=0.2.1.post1: the .post1 re-upload ships only an armv7l wheel; PEP 440
      # ranks it above 0.2.1 so the bare range picks it and pip fails on x86_64.
      - "kaleido>=0.2.1,!=0.2.1.post1,<1.0"
      - tabulate
      - notebook
      - jupyter_server
      - ipywidgets
      - snakemake==9.15.0
      - snakemake-executor-plugin-slurm==2.1.0
      - snakemake-executor-plugin-slurm-jobstep==0.4.0
      - snakemake-storage-plugin-fs==1.1.3
      # RO-Crate provenance core dependency (ADR-5/6/7); pinned for byte-determinism.
      - rocrate==0.15.0
