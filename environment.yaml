# to run:
# if environment already exists, first run:
# conda deactivate
# conda env remove -n triton_swmm_toolkit
# then:
# either:
  # clean install, no use of :
    # conda create -n triton_swmm_toolkit python=3.11 --no-default-packages
    # conda activate triton_swmm_toolkit
    # export PYTHONNOUSERSITE=1
    # conda env update -f environment.yaml
  # create directly from environment yaml
    # module purge
    # module load {conda app, e.g., miniforge}
    # conda env create -f environment.yaml
    # conda (or source) activate triton_swmm_toolkit
# IMPORTANT: after creating the environment, install the package in editable mode:
  # pip install -e .
  # (required — without this, imports of TRITON_SWMM_toolkit will fail)
name: triton_swmm_toolkit
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - filelock
  - typer
  - pydantic
  - pyyaml
  - zarr
  - netcdf4
  - scipy
  - pydap
  - h5netcdf
  - cftime
  - bottleneck
  - dask
  - matplotlib
  - seaborn
  - sparse
  - pint
  - bagit
  - openpyxl
  # geospatial packages
  - rioxarray
  - cartopy
  - geopandas
  - fiona
  - pyproj
  - shapely
  # build tools
  - cmake
  - openmpi
  - gxx_linux-64
  # other stuff
  - coverage
  - pytest
  - pytest-xdist>=3.0
  - py-spy>=0.3.14
  - ruff
  - ty
  - ipdb
  - ipykernel
  - pip
  - "setuptools<78"  # hsclient uses pkg_resources, removed from setuptools>=78
  - pip:
      - hsclient
      - pyswmm
      - swmmio
      - tabulate
      - notebook
      - jupyter_server
      - ipywidgets
      - snakemake==9.15.0
      - snakemake-executor-plugin-slurm==2.1.0
      - snakemake-executor-plugin-slurm-jobstep==0.4.0
      - snakemake-storage-plugin-fs==1.1.3
