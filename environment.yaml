# to run:
# if environment already exists, first run:
# conda deactivate
# conda env remove -n hhemt
# then:
# either:
  # clean install, no use of :
    # conda create -n hhemt python=3.11 --no-default-packages
    # conda activate hhemt
    # export PYTHONNOUSERSITE=1
    # conda env update -f environment.yaml
  # create directly from environment yaml
    # module purge
    # module load {conda app, e.g., miniforge}
    # conda env create -f environment.yaml
    # conda (or source) activate hhemt
# IMPORTANT: after creating the environment, run BOTH post-create steps, in order:
  # pip install --no-deps "swmmio==0.8.5"
  # pip install -e . --no-deps
  # (both required — without them, imports of hhemt fail AND pyswmm is downgraded)
#
# WHY swmmio is installed here with --no-deps instead of in the `pip:` block below:
#   swmmio 0.8.5 metadata declares `pyswmm<2.0,>=1.2` and `numpy<2.0`. conda runs the
#   ENTIRE `pip:` block as ONE `pip install -U -r <tmpfile>` (conda/env/installers/pip.py),
#   so pip satisfies those caps by DOWNGRADING the conda-installed pyswmm 2.0.1 -> 1.5.1
#   and numpy 2.x -> 1.26.4, and reinstalls ~10 further conda packages from PyPI. That
#   breaks prepare_scenario's SWMM-runoff step upstream of every render.
#   hhemt only ever calls `swmmio.Model(...)` (.inp parsing); swmmio imports pyswmm solely
#   in its CLI wrapper and its own tests, so the `<2.0` cap is not load-bearing here and
#   --no-deps is safe. swmmio's real runtime deps are declared in the conda section below.
#   `pip install -e . --no-deps` for the same reason: pyproject.toml leaves pyswmm unpinned.
name: hhemt
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - filelock
  - typer
  - pydantic
  - pyyaml
  - zarr
  - netcdf4
  - scipy
  - pydap
  - h5netcdf
  - h5py  # h5netcdf's default backend; scenario._write_sim_weather_nc reads weather.nc via the xarray h5netcdf engine
  - cftime
  - bottleneck
  - dask
  - matplotlib
  - seaborn
  - jinja2
  - sparse
  - pint
  - bagit
  - openpyxl
  # geospatial packages
  - rioxarray
  - cartopy
  - geopandas
  - fiona
  - pyproj
  - shapely
  # swmmio runtime deps — declared explicitly because swmmio is installed with
  # --no-deps post-create (see header). `numpy<2` / `pandas<3` re-declare the caps
  # swmmio 0.8.5 would otherwise have imposed via pip: the project is validated on
  # numpy 1.26.4 / pandas 2.3.3, and conda-forge now ships numpy 2.4.6 / pandas 3.0.3
  # for py311 — without these pins a fresh solve silently jumps two major versions.
  - "numpy<2"
  - "pandas<3"
  - geojson
  - pyshp
  - networkx
  # pyproject CORE deps that `pip install -e . --no-deps` does NOT install.
  # `--no-deps` (required — see header) means the conda env is the ONLY source of the
  # project's runtime graph, so environment.yaml MUST be a superset of pyproject.toml's
  # `[project].dependencies`. Enforced by scripts/check_env_lock_consistency.py; the sole
  # sanctioned exception is `swmmio`, installed post-create with --no-deps (see header).
  # Omitting any of these surfaces as an opaque ModuleNotFoundError at test-collection
  # time in a 90-minute CI job (this is exactly how `plotly` broke run 29175069823).
  - plotly=5.24.1
  - rich
  - requests>=2.25
  - globus-sdk>=3.0
  - datashader>=0.16
  # build tools
  - cmake
  - openmpi
  - gxx_linux-64
  # other stuff
  - coverage
  - pytest
  - pytest-xdist>=3.0
  - py-spy>=0.3.14
  - ruff=0.15.10
  - ty
  - pre-commit
  - ipdb
  - ipykernel
  - pip
  - "setuptools<78"  # hsclient uses pkg_resources, removed from setuptools>=78
  # SWMM Python engine from conda-forge, NOT the PyPI wheel: the PyPI
  # swmm-toolkit 0.17.0 wheel heap-corrupts in pyswmm Simulation.execute()
  # (free(): tcache 2 / SIGABRT) on modern glibc, and 0.17.0 also has an
  # Output.node_series "Input Error 422" reader regression. conda-forge
  # swmm-toolkit=0.15 (0.15.2) is clean on both; pyswmm=2.0.1 is the matching pin.
  #
  # INVARIANT (enforced by scripts/check_env_lock_consistency.py): NOTHING in the
  # `pip:` block below may name or depend on pyswmm / swmm-toolkit / swmmio. conda
  # runs the whole `pip:` block as a single `pip install -U -r`, and any pip spec
  # that constrains pyswmm will silently uninstall the conda one. swmmio is
  # therefore installed post-create with --no-deps (see header).
  - swmm-toolkit=0.15
  - pyswmm=2.0.1
  - pip:
      - hsclient
      # !=0.2.1.post1: the .post1 re-upload ships only an armv7l wheel; PEP 440
      # ranks it above 0.2.1 so the bare range picks it and pip fails on x86_64.
      - "kaleido>=0.2.1,!=0.2.1.post1,<1.0"
      - tabulate
      - notebook
      - jupyter_server
      - ipywidgets
      - snakemake==9.15.0
      - snakemake-executor-plugin-slurm==2.1.0
      - snakemake-executor-plugin-slurm-jobstep==0.4.0
      - snakemake-storage-plugin-fs==1.1.3
      # RO-Crate provenance core dependency (ADR-5/6/7); pinned for byte-determinism.
      - rocrate==0.15.0
