# Toolchain-bearing tier: provisions the hhemt conda env (cmake + mpic++ +
# swmm-toolkit conda-forge pin) so the compile-bearing synth render tests
# (test_synth_04 / test_synth_05 / test_synth_eda_facade) actually RUN instead
# of skipping. Wireable as a required main status check by the release-gate PIP
# (ADR-7); no continue-on-error.
name: Compile-bearing synth render-gate tier

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "develop" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compile-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-synth-render-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Provision toolchain-bearing conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: hhemt
          environment-file: environment.yaml
          auto-activate-base: false

      - name: Install project (editable, test extras)
        run: pip install -e ".[test]"

      - name: Toolchain sanity (cmake + mpic++ reachable)
        run: |
          command -v cmake
          command -v mpic++

      - name: Guard — environment-lock.yaml swmm-provenance consistency
        run: python scripts/check_env_lock_consistency.py

      - name: Compile-bearing synth render-gate tests (serial, toolchain-required)
        env:
          HHEMT_REQUIRE_COMPILE_TIER: "1"
          TRITON_SWMM_REQUIRE_BUNDLE_FIXTURE: "1"
          # NOTE (ADR-18): HHEMT_ENABLE_PROVENANCE_AUDIT is deliberately NOT set here.
          # The renderer-IO provenance audit is opt-IN / default-OFF because its
          # empirically-derived incidental-read allowlist is host-specific and cannot
          # reliably pass on a GitHub runner (different cache/font/GDAL/PROJ layout) —
          # a required audit job would re-introduce the exact false-positive this design
          # removes. The declared-subset-of-actual invariant is enforced on the
          # maintainer host / locally:
          #   HHEMT_ENABLE_PROVENANCE_AUDIT=1 conda run -n hhemt pytest \
          #     tests/test_synth_04_multisim_with_snakemake.py::test_renderer_provenance_audit_passes_for_all_multisim_renderers \
          #     tests/test_synth_05_sensitivity_analysis_with_snakemake.py::test_renderer_provenance_audit_passes_for_all_sensitivity_renderers
          # Re-enable in CI only after the C-open API-wrap (deferred) makes the read
          # surface host-portable.
        run: |
          pytest -p no:xdist -v \
            tests/test_synth_04_multisim_with_snakemake.py \
            tests/test_synth_05_sensitivity_analysis_with_snakemake.py \
            tests/test_synth_eda_facade.py \
            --deselect tests/test_synth_04_multisim_with_snakemake.py::test_snakemake_workflow_end_to_end
