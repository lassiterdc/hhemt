# CITATION.cff validation gate: fails if CITATION.cff is malformed.
# Part of the release-gate-and-branch-protection plan (ADR-7). The job key
# `citation-validate` IS the required-status-check context string; do not add a
# job-level `name:` (it would replace the context). Triggers on PRs to main so a
# develop->main release PR reports this check on its head commit.
name: Citation validate

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  citation-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cffconvert
        run: python -m pip install --upgrade pip cffconvert
      - name: Validate CITATION.cff
        run: cffconvert --validate --infile CITATION.cff
