# This workflow will install Python dependencies, run tests and lint.
# For more information see: https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-python

name: Test Python application

# NOTE (first-public-release): this job installs via `pip install -e ".[test]"`,
# which resolves an UNVALIDATED SWMM stack, so every SWMM-executing test SKIPS
# (tests/utils_for_testing.py::swmm_stack_version_mismatch fires). This check
# therefore certifies lint + non-SWMM unit behavior ONLY. "The software compiles
# and runs SWMM" is certified by compile-tests.yml, which provisions the validated
# conda env — that job must be a REQUIRED status check before the release PR.

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # Test all supported Python versions under Ubuntu
        os: [ubuntu-latest]
        python-version: ['3.12']

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install project with test extras
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    - name: Lint with ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check --select=E9,F63,F7,F82
        # exit-zero treats all errors as warnings
        ruff check --exit-zero --statistics
    - name: Run tests
      run: |
        pytest
