name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install build
        run: python -m pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/hhemt
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Idempotent re-run: publish-to-pypi `needs` this job, so without
          # skip-existing a re-run of the whole workflow (after a PyPI-side
          # failure) dies here on the already-uploaded 0.1.0 file and PyPI is
          # never reached — leaving the release permanently stuck without a
          # version bump. A published version is immutable; the workflow must not be.
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build, publish-to-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hhemt
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-run: `python -m build` emits TWO files (sdist + wheel) and
          # gh-action-pypi-publish uploads both via twine. A transient failure BETWEEN
          # the two uploads leaves one file on PyPI (immutable). Re-running this job
          # (even `gh run rerun --failed`) then 400s on the already-present file and the
          # release strands half-published at 0.1.0 — unfixable without a 0.1.1 bump.
          # skip-existing skips the landed file and uploads the missing one.
          skip-existing: true
