# Sentinel list for scripts/check_layout_version.py check-b.
# A change to any path/glob below WITHOUT a LAYOUT_VERSION bump fails CI.
# Add a path to non_breaking_allowlist (with a justifying commit message)
# when the change touches a layout-relevant module but does not break on-disk state.
layout_relevant:
  paths:
    - src/hhemt/paths.py
    - src/hhemt/scenario.py
    - src/hhemt/log.py
    - src/hhemt/scenario_inputs.py
    - src/hhemt/process_simulation.py
    - src/hhemt/processing_analysis.py
    - src/hhemt/cf_conventions.py
    - src/hhemt/sensitivity_analysis.py
    - src/hhemt/report_plot_ids.py  # reporting-system_canonical-plot-id (ADR-2): the canonical plot-ID grammar + per-renderer extension map. Figure stems ARE the plot IDs; a change here changes on-disk figure filenames (C-LAYOUT) and must bump LAYOUT_VERSION + ship a V{NNNN} migration. workflow.py consumes this module but is intentionally NOT layout-relevant (highest-churn file; would flood Check-B with false positives).
  globs:
    - "src/hhemt/config/**/*.py"
    - "src/hhemt/version_migration/schema/*.json"
    - "src/hhemt/version_migration/versions/*.py"
non_breaking_allowlist:
  - path: src/hhemt/process_simulation.py
    justification: >-
      cleanup-rerun-delete-redesign Phase 3 — replaces structurally broken
      _clear_raw_TRITON_outputs + _clear_raw_SWMM_outputs with a single corrected
      _clear_raw_outputs(model_type). Behavior change; existing on-disk analyses
      continue to work post-upgrade.
  - path: src/hhemt/scenario.py
    justification: >-
      cleanup-rerun-delete-redesign Phase 3 — incidental method-signature touch to
      remove clear_raw_outputs references. No path or layout changes.
  - path: src/hhemt/log.py
    justification: >-
      reprocess-orchestrator-liveness-gate Phase 1 + log-write-race-fix +
      resume-retry-resilience P2/P3 — additive LogFields (orchestrator_slurm_jobid,
      n_resumes, multi_allocation_in_progress) and removal of the 7 persisted all_*
      rollup LogFields (now @property). Legacy log.json files load cleanly via
      pydantic extra=ignore / default_factory; no Snakemake rule reads log.json;
      on-disk layout unchanged.
  - path: src/hhemt/processing_analysis.py
    justification: >-
      reprocess-regeneration-toggle Phase 2 R4 — behavior-only early-return re-key
      (.exists() to .exists() AND datatree_consolidation_complete). The log field
      already exists and is set on success; no on-disk layout change.
  - path: src/hhemt/sensitivity_analysis.py
    justification: >-
      resume-retry-resilience P1 (override_hpc_restart_times_simulate/_other facade
      thread) + run-honesty-orphan-dryrun-reportconfig Phase 1 (find_orphan_input_fingerprints
      + 4th cleanup class). Signature/read-delete behavior over the existing
      sa-{sa_id}_inputs.json fingerprint format; no on-disk fingerprint schema/path/
      _version.json/datatree change.
  - path: src/hhemt/config/viz_vocabulary.py
    justification: >-
      reporting-system frozen-viz-vocabulary — new frozen plotting-vocabulary module
      (token enums + Annotated registry-validator aliases). Pure in-memory config
      code; no on-disk layout.
  - path: src/hhemt/config/brand_theme.py
    justification: >-
      reporting-system config-layering-and-branding — new ADR-7 brand-theme Pydantic
      model. Pure in-memory config schema; no on-disk layout.
  - path: src/hhemt/config/case_manifest.py
    justification: >-
      case-study-hosting-conventions — new ADR-12 CaseManifest Pydantic model
      (case.yaml schema). Pure in-memory config schema; no on-disk layout.
  - path: src/hhemt/config/report.py
    justification: >-
      reporting-system named-reporting-sets + config-layering-and-branding D-5 —
      retires SensitivityReportConfig.mode, adds reporting_set selector +
      before-validator; _HtmlTableStyleBase brand defaults overridden at run().
      Config-schema/behavior-only; no figure-stem rename, no on-disk output-dir change.
  - path: src/hhemt/config/hpc_system.py
    justification: >-
      hpc-system-profile-config Phase 1 + containerization ADR-1 — new per-HPC-system
      config model (native-mirrored PartitionLimits vocab) + additive ContainerSpec.
      Config schema is NOT on-disk layout; the breaking partition-axis change is the
      separate V0013 migration.
  - path: src/hhemt/config/static_plots.py
    justification: >-
      reporting-system_publication-static-config-schema ADR-4 — new publication
      static-plot Pydantic config family. Pure in-memory config schema; no on-disk
      layout / figure stem / zarr / log / path change.
  - path: src/hhemt/config/reprex_taxonomy.py
    justification: >-
      reproducibility-system_reprex-foundations (C12) — new ADR-10 field->bucket
      taxonomy classifier (pure static-table lookup over _PATH_FIELD_POLICY;
      field_bucket -> user|hpc|experiment). Pure in-memory config schema; no on-disk
      layout / figure stem / zarr / log / path change. Non-breaking (mirrors
      viz_vocabulary.py / brand_theme.py / static_plots.py).
  - path: src/hhemt/config/eda.py
    justification: >-
      EDA config-schema addition (eda_config submodel: enabled_plots, plotly_js_mode,
      tabulator_js_mode). Pure in-memory config schema; no on-disk layout. Recorded in
      the CLAUDE.md config-field table as allowlisted; this entry closes the missing
      allowlist row the fnmatch glob bug had hidden.
  - path: src/hhemt/config/analysis.py
    justification: >-
      Two collapsed non-breaking changes (former duplicate entries). containerization
      ADR-1 — additive execution_environment selector. AND resume-retry-resilience P1 —
      retire hpc_restart_times for hpc_restart_times_simulate/_other. Both config-schema
      only; not sensitivity-overlay columns; do not reach the per-sa input fingerprint;
      no on-disk layout change.
  - path: src/hhemt/config/invalidating_fixes.py
    justification: >-
      reproducibility-system_version-provenance-and-recompute Phase 3 (ADR-17) — new
      Pydantic loader for the invalidating-fix registry. Pure INPUT-schema module
      (describes bug-fix commits, not on-disk analysis layout); no
      zarr/log/path/_version.json/fingerprint/datatree change. Layout-relevant only via
      the config/**/*.py glob; non-breaking, no LAYOUT_VERSION bump.
  - path: src/hhemt/config/base.py
    justification: >-
      compile-bearing-synth-ci-tier Phase 1 — _check_paths_exist honors
      json_schema_extra={"toolkit_owned_output": True} to skip the load-time
      exists() check for clone-gate-created software dirs. Pure validation-logic
      change; no on-disk layout / _version.json / fingerprint / datatree /
      path-schema change. Non-breaking.
  - path: src/hhemt/config/system.py
    justification: >-
      compile-bearing-synth-ci-tier Phase 1 — annotate TRITONSWMM_software_directory
      + SWMM_software_directory json_schema_extra={"toolkit_owned_output": True}
      (toolkit-owned build outputs, exempt from load-time exists()). Schema-annotation
      only; no on-disk layout change. Non-breaking.
