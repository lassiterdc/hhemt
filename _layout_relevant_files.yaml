# Sentinel list for scripts/check_layout_version.py check-b.
# A change to any path/glob below WITHOUT a LAYOUT_VERSION bump fails CI.
# Add a path to non_breaking_allowlist (with a justifying commit message)
# when the change touches a layout-relevant module but does not break on-disk state.
layout_relevant:
  paths:
    - src/TRITON_SWMM_toolkit/paths.py
    - src/TRITON_SWMM_toolkit/scenario.py
    - src/TRITON_SWMM_toolkit/log.py
    - src/TRITON_SWMM_toolkit/scenario_inputs.py
    - src/TRITON_SWMM_toolkit/process_simulation.py
    - src/TRITON_SWMM_toolkit/processing_analysis.py
    - src/TRITON_SWMM_toolkit/cf_conventions.py
    - src/TRITON_SWMM_toolkit/sensitivity_analysis.py
    - src/TRITON_SWMM_toolkit/report_plot_ids.py  # reporting-system_canonical-plot-id (ADR-2): the canonical plot-ID grammar + per-renderer extension map. Figure stems ARE the plot IDs; a change here changes on-disk figure filenames (C-LAYOUT) and must bump LAYOUT_VERSION + ship a V{NNNN} migration. workflow.py consumes this module but is intentionally NOT layout-relevant (highest-churn file; would flood Check-B with false positives).
  globs:
    - "src/TRITON_SWMM_toolkit/config/**/*.py"
    - "src/TRITON_SWMM_toolkit/version_migration/schema/*.json"
    - "src/TRITON_SWMM_toolkit/version_migration/versions/*.py"
# cleanup-rerun-delete-redesign Phase 1: these paths are config-schema or
# behavior-only changes — no on-disk layout changes. Justifications:
#   - process_simulation.py: Phase 3 — replaces structurally broken
#     `_clear_raw_TRITON_outputs` + `_clear_raw_SWMM_outputs` with a single
#     corrected `_clear_raw_outputs(model_type)`. Behavior change; existing
#     on-disk analyses continue to work post-upgrade.
#   - scenario.py: Phase 3 — incidental method-signature touch to remove
#     `clear_raw_outputs` references. No path or layout changes.
#   - sensitivity_analysis.py: Phases 2 + 3 + 4 — adds `delete()` method,
#     removes `clear_raw_outputs`, adds `override_force_rerun`. No on-disk
#     layout changes; per-sa fingerprint schema (Gotcha 17) unchanged.
#   - config/analysis.py: Phase 1 — adds Pydantic `clear_raw` and
#     `force_rerun` fields. Config schema is NOT on-disk layout.
non_breaking_allowlist:
  - src/TRITON_SWMM_toolkit/process_simulation.py
  - src/TRITON_SWMM_toolkit/scenario.py
  - src/TRITON_SWMM_toolkit/sensitivity_analysis.py
  - src/TRITON_SWMM_toolkit/config/analysis.py
  - src/TRITON_SWMM_toolkit/log.py  # reprocess-orchestrator-liveness-gate Phase 1: additive orchestrator_slurm_jobid LogField (optional, default-empty); non-breaking — older trees read it as empty, no on-disk migration.
  - src/TRITON_SWMM_toolkit/processing_analysis.py  # reprocess-regeneration-toggle Phase 2 R4: behavior-only early-return re-key (.exists() to .exists() AND datatree_consolidation_complete); the log field already exists and is already set on success — no on-disk layout change.
  - src/TRITON_SWMM_toolkit/config/viz_vocabulary.py  # reporting-system frozen-viz-vocabulary: new frozen plotting-vocabulary module (project token enums + Annotated registry-validator aliases). Pure in-memory config code — no on-disk layout, no zarr/log/path schema. Non-breaking.
