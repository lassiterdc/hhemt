# Canonical report_config for UVACaseStudies.benchmarking_norfolk_irene.
# Wired in src/TRITON_SWMM_toolkit/case_study_catalog.py via report_config_path.
# Schema: src/TRITON_SWMM_toolkit/config/report.py.
figure_defaults:
  font_family: "DejaVu Sans"
  font_size: 10
  dpi: 100
  savefig_dpi: 150

system_map:
  target_epsg: null
  figsize_inches: [10.0, 8.0]
  watershed_color: red

per_sim:
  peak_flood_depth:
    figsize_inches: [10.0, 8.0]
    cmap: viridis
  conduit_flow:
    figsize_inches: [10.0, 4.0]
    cmap: plasma

per_analysis_summary:
  metrics:
    - n_sims
    - n_successful
    - n_pending
    - n_failed
    - enabled_model_types
    - sensitivity_mode

sensitivity:
  mode: benchmarking
  # n_devices is derived (n_mpi_procs * n_omp_threads * n_nodes for CPU runs;
  # n_gpus for GPU runs) — see sensitivity_benchmarking._ensure_n_devices_column.
  # Allow-listed by the validator alongside literal CSV columns.
  independent_vars:
    - n_devices
  dependent_var: performance.Total
  aggregation: mean
  group_by_var: run_mode
  show_gridlines: true
