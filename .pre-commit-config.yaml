# Pre-commit hooks for TRITON-SWMM toolkit
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Version-migration discipline (scripts/check_layout_version.py)
  # Check A: LAYOUT_VERSION bump => migration module + fixtures
  # Check B: layout-relevant file change => bump or non_breaking_allowlist entry
  - repo: local
    hooks:
      - id: check-layout-version-a
        name: check LAYOUT_VERSION bump implies migration + fixtures
        entry: python scripts/check_layout_version.py check-a HEAD~1
        language: system
        pass_filenames: false
        always_run: true
      - id: check-layout-version-b
        name: check layout-relevant files trigger LAYOUT_VERSION bump
        entry: python scripts/check_layout_version.py check-b HEAD~1
        language: system
        pass_filenames: false
        always_run: true

  # DU-sentinel mutation-site restamp discipline (scripts/check_du_sentinel_sites.py)
  # Flags fast_rmtree(...) missing analysis_dir= and .unlink() not adjacent-followed
  # by restamp_parent_sentinels(...), unless the site carries # EXEMPT-DU: {category}.
  - repo: local
    hooks:
      - id: check-du-sentinel-sites
        name: DU-sentinel mutation-site restamp check
        entry: python scripts/check_du_sentinel_sites.py
        language: system
        pass_filenames: false
        always_run: true
