# Used by tests/test_synth_04_multisim_with_snakemake.py
figure_defaults:
  font_family: "DejaVu Sans"
  font_size: 9
  dpi: 100
  savefig_dpi: 100  # lower for fast test renders

system_map:
  figsize_inches: [8.0, 6.0]
  watershed_color: red
  dem_extent_color: blue
  bc_marker: o
  bc_color: orange
  swmm_node_color: black
  swmm_node_size: 6.0
  swmm_link_color: gray
  swmm_link_width: 0.5

per_sim:
  peak_flood_depth:
    figsize_inches: [8.0, 6.0]
    cmap: viridis
    vmin: 0.0
    vmax: 1.5
  conduit_flow:
    figsize_inches: [10.0, 4.0]
    cmap: plasma
    vmin: 0.0
    vmax: null

per_analysis_summary:
  metrics:
    - n_sims
    - n_successful
    - n_pending
    - n_failed
    - enabled_model_types
